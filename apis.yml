access: 3rd-Party
created: '2024-12-03'
modified: '2026-05-19'
position: Consuming
description: >-
  The Substance Abuse and Mental Health Services Administration (SAMHSA) is a branch of the U.S. Department of Health
  and Human Services dedicated to improving the quality and availability of prevention, treatment, and recovery support
  services for individuals struggling with substance abuse and mental health disorders. SAMHSA provides APIs and open
  data for the behavioral health treatment services locator, national survey data (NSDUH), treatment episode statistics
  (TEDS), and state mental health data.
